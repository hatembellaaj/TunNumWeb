server {
    listen       8093;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Allow large video files to be served with byte-range support (seek in <video>)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /Assets/ {
        add_header Accept-Ranges bytes;
        expires 7d;
        access_log off;
    }
}
